* {
  font-family: "JetBrainsMono Nerd Font";
  font-weight: 500;
  font-size: 14px;
  color: rgba(205, 214, 244, 1.0);
}

#waybar {
  background-color: rgba(0, 0, 0, 0);
  border: none;
  box-shadow: none;
}

/* solo */
#mode,
#workspaces,
#window,
#battery,
#custom-notification,
#custom-weather
{
  background-color: rgba(36, 39, 58, 0.85);
  border: 1px solid rgba(203, 166, 247, 1.0);
  padding: 4px 6px;

  margin-top: 5px;
  margin-bottom: 5px;
  margin-left: 5px;
  margin-right: 5px;

  border-radius: 6px;
}

/* left */
#network,
#custom-media,
#clock.local
{
  background-color: rgba(36, 39, 58, 0.85);

  border-top: 1px solid rgba(203, 166, 247, 1.0);
  border-left: 1px solid rgba(203, 166, 247, 1.0);
  border-bottom: 1px solid rgba(203, 166, 247, 1.0);
  border-radius: 6px 0 0 6px;

  padding: 4px 2px;

  margin-top: 6px;
  margin-bottom: 6px;
  margin-left: 6px;
}

/* mid */
#custom-prev,
#custom-play,
#bluetooth
{
  background-color: rgba(36, 39, 58, 0.85);

  border-top: 1px solid rgba(203, 166, 247, 1.0);
  border-bottom: 1px solid rgba(203, 166, 247, 1.0);

  padding: 4px 2px;

  margin-top: 6px;
  margin-bottom: 6px;
}

/* right */
#custom-next,
#clock.chicoutimi,
#pulseaudio
{
  background-color: rgba(36, 39, 58, 0.85);

  border-top: 1px solid rgba(203, 166, 247, 1.0);
  border-right: 1px solid rgba(203, 166, 247, 1.0);
  border-bottom: 1px solid rgba(203, 166, 247, 1.0);
  border-radius: 0 6px 6px 0;

  padding: 4px 2px;

  margin-top: 6px;
  margin-bottom: 6px;
  margin-right: 6px;
}

#workspaces:hover,
#custom-media:hover,
#custom-prev:hover,
#custom-play:hover,
#custom-next:hover,
#network:hover,
#bluetooth:hover,
#pulseaudio:hover,
#battery:hover,
#clock:hover,
#custom-weather:hover,
#custom-notification:hover,
#window:hover {
  background-color: rgba(70, 75, 90, 0.9);
}



#workspaces button {
  background: transparent;
  border: none;
  padding: 0px 6px;
  margin: 1px;
  border-bottom: 3px solid transparent;
  transition: all 0.2s ease;
}

#workspaces button.active {
  border-radius: 0px;
  border-bottom: 3px solid #f5c2e7;
}

#workspaces button:hover{
  border-radius: 0px;
  border-bottom: 3px solid #fae0f3;
  box-shadow: none;
}
